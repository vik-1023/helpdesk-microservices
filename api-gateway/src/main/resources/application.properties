# ===============================
# = SERVER PORT CONFIGURATION
# ===============================
server.port=9090


# ===============================
# = APPLICATION NAME
# ===============================
spring.application.name=API-GATEWAY


# ===============================
# = EUREKA CLIENT CONFIGURATION
# ===============================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true


# ===============================
# = DISABLE AUTO SERVICE ROUTING
# ===============================
# Because we are using manual route configuration
spring.cloud.gateway.discovery.locator.enabled=false


# ===============================
# = AUTH SERVICE ROUTING
# ===============================
# Handles login/signup requests

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**


# ===============================
# = TICKET SERVICE ROUTING
# ===============================
# Routes ticket-related APIs

spring.cloud.gateway.routes[1].id=ticket-service
spring.cloud.gateway.routes[1].uri=lb://TICKET-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/ticket-service/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1


# ===============================
# = USER MANAGEMENT ROUTING
# ===============================
# Routes user-related APIs

spring.cloud.gateway.routes[2].id=user-management
spring.cloud.gateway.routes[2].uri=lb://USER-MANAGEMENT
spring.cloud.gateway.routes[2].predicates[0]=Path=/user-management/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1